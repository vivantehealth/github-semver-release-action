name: 'GitHub semver release'
description: "GitHub Action to perform a GitHub semantic version release, along with an update to the major version tag"
inputs:
  default-bump:
    description: 'Default semver segment to bump'
    default: 'minor'
    required: false
  v-prefix:
    required: false
    description: 'Whether to prefix the version with a "v"'
    default: 'true'
  create-floating-major-tag:
    required: false
    description: 'Whether to create/update a floating major tag'
    default: 'true'
  create-floating-minor-tag:
    required: false
    description: 'Whether to create/update a floating minor tag'
    default: 'true'
  floating-tag-sha:
    required: false
    description: 'Which git sha to use for the floating tags. Useful for CD workflows where the main branch is pushed just prior to tagging'
    default: ''
  artifacts:
    description: 'Path of artifacts to upload. comma separated list and supports glob patterns'
    required: false
    default: ''
outputs:
  major:
    description: 'Major version'
    value: ${{ steps.semver.outputs.major }}
  minor:
    description: 'Minor version in *.* format'
    value: ${{ steps.semver.outputs.minor }}
  patch:
    description: 'The new version'
    value: ${{ steps.semver.outputs.new_tag }}
  version:
    description: 'The new version'
    value: ${{ steps.semver.outputs.new_tag }}
  tag:
    description: 'The new version'
    value: ${{ steps.semver.outputs.new_tag }}
  part:
    description: 'The bumped segment'
    value: ${{ steps.semver.outputs.part }}

runs:
  using: "composite"
  steps:
    - name: Calculate next version
      id: semver
      shell: bash
      env:
        INPUT_DEFAULT_BUMP: ${{ inputs.default-bump }}
        INPUT_V_PREFIX: ${{ inputs.v-prefix }}
        ACTION_PATH: ${{ github.action_path }}
        GOTOOLCHAIN: local
      run: |
        PREFIX=""
        if [[ "$INPUT_V_PREFIX" == "true" ]]; then
          PREFIX="v"
        fi
        LATEST_TAG=$(git tag --list "${PREFIX}[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1)
        COMMIT_MSG=$(git log -1 --format=%B)
        LATEST_TAG="$LATEST_TAG" COMMIT_MSG="$COMMIT_MSG" \
          go run -C "$ACTION_PATH" . "$INPUT_DEFAULT_BUMP" "$INPUT_V_PREFIX"

    - name: Create release
      if: steps.semver.outputs.part != 'none'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_TAG: ${{ steps.semver.outputs.new_tag }}
        INPUT_TARGET: ${{ github.sha }}
        INPUT_ARTIFACTS: ${{ inputs.artifacts }}
      run: |
        shopt -s nullglob
        ARGS=(--generate-notes --target "$INPUT_TARGET")

        if [[ -n "$INPUT_ARTIFACTS" ]]; then
          IFS=',' read -ra FILES <<< "$INPUT_ARTIFACTS"
          for f in "${FILES[@]}"; do
            for match in $f; do
              ARGS+=("$match")
            done
          done
        fi

        gh release create "$INPUT_TAG" "${ARGS[@]}"

    - name: Update floating tags
      if: steps.semver.outputs.part != 'none' && (inputs.create-floating-major-tag == 'true' || inputs.create-floating-minor-tag == 'true')
      shell: bash
      env:
        INPUT_FLOATING_TAG_SHA: ${{ inputs.floating-tag-sha }}
        INPUT_GITHUB_SHA: ${{ github.sha }}
        INPUT_CREATE_MAJOR: ${{ inputs.create-floating-major-tag }}
        INPUT_CREATE_MINOR: ${{ inputs.create-floating-minor-tag }}
        INPUT_MAJOR: ${{ steps.semver.outputs.major }}
        INPUT_MINOR: ${{ steps.semver.outputs.minor }}
      run: |
        SHA="${INPUT_FLOATING_TAG_SHA:-$INPUT_GITHUB_SHA}"

        if [[ "$INPUT_CREATE_MAJOR" == "true" ]]; then
          git tag -f "$INPUT_MAJOR" "$SHA"
          git push -f origin "refs/tags/$INPUT_MAJOR"
          echo "Updated $INPUT_MAJOR to $SHA"
        fi

        if [[ "$INPUT_CREATE_MINOR" == "true" ]]; then
          git tag -f "$INPUT_MINOR" "$SHA"
          git push -f origin "refs/tags/$INPUT_MINOR"
          echo "Updated $INPUT_MINOR to $SHA"
        fi
